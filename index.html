<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador de Personagem 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; color: white; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-panel { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; width: 300px; }
        .slider-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="range"] { width: 100%; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h2>Customizar Corpo</h2>
        
        <div class="slider-group">
            <label for="largura-ombros">Largura dos Ombros</label>
            <input type="range" id="largura-ombros" min="0.5" max="1.5" step="0.01" value="1">
        </div>

        <div class="slider-group">
            <label for="espessura-bracos">Espessura dos Braços</label>
            <input type="range" id="espessura-bracos" min="0.5" max="2.0" step="0.01" value="1">
        </div>
        
        <div class="slider-group">
            <label for="tamanho-cabeca">Tamanho da Cabeça</label>
            <input type="range" id="tamanho-cabeca" min="0.8" max="1.5" step="0.01" value="1">
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
